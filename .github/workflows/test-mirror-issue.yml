name: Test mirror-issue (reusable)
on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Mirror issue number'
        required: true
        type: string

permissions:
  issues: write

jobs:
  mirror:
    uses: hermeto-fullsend/workflows/.github/workflows/mirror-issue.yml@mirror-issue-workflow
    with:
      upstream_repo: hermetoproject/hermeto
      mirror_issue_number: ${{ inputs.issue_number }}
